name: PyPI

# Publishes `minibwa` wheels to PyPI when a GitHub release is published.
#
# Trigger chain:
#   1. release-plz PR merges to `main`.
#   2. `publish.yml` runs `cargo publish` for the Rust crates.
#   3. `publish.yml` creates a GitHub release tagged `v<VERSION>`.
#   4. The `release: published` event fires this workflow.
#
# `workflow_dispatch` is available for one-off manual republishes against an
# existing tag; pick the tag in the run dialog (sets `github.ref` to that tag).
#
# minibwa-py is a member of the workspace and inherits the shared crate version
# (`version.workspace = true`), and its pyproject.toml declares the version
# `dynamic`, so maturin stamps the wheel with the released version automatically.
# release-plz therefore bumps the wheel version in lockstep and every release
# publishes a fresh version (no more "File already exists").
#
# PyPI authentication uses Trusted Publishing (OIDC). The PyPI project
# `minibwa` must have a configured publisher pointing at this workflow file
# and the `pypi` environment before the first run; see CONTRIBUTING.md.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: minibwa-py

jobs:
  wheels:
    name: wheel (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2_28"
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: "2_28"
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name || github.ref }}
      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          working-directory: minibwa-py
          target: ${{ matrix.target }}
          args: --release --out dist
          # minibwa-sys runs bindgen at build time, which needs libclang. The
          # manylinux_2_28 image (AlmaLinux 8) ships zlib-devel but neither clang
          # nor libclang, so install it in the container before building. Ignored
          # on macOS, where clang/libclang are present natively.
          before-script-linux: dnf install -y clang
          manylinux: ${{ matrix.manylinux || 'auto' }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-${{ matrix.target }}
          path: minibwa-py/dist/*.whl
          if-no-files-found: error

  publish:
    name: Upload to PyPI
    needs: [wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/minibwa
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Show artifact set
        working-directory: .
        run: ls -lh dist/
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          packages-dir: dist/
          # A re-run against an already-published version should no-op, not fail.
          skip-existing: true
